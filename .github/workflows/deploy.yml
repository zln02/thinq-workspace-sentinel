name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "배포할 ref (브랜치·태그·SHA). 비우면 main"
        required: false
        type: string

concurrency:
  group: deploy-vm
  cancel-in-progress: false  # 배포 중단 위험 — 큐잉만

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger summary
        run: |
          echo "Deploy ref: ${{ github.event.inputs.ref || github.sha }}"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
          DEPLOY_REF: ${{ github.event.inputs.ref || github.sha }}
        run: |
          ssh "$VM_USER@$VM_HOST" bash <<EOF
          set -euo pipefail
          cd ~/thinq-workspace-sentinel
          echo "== fetch & checkout =="
          git fetch --all --prune
          git checkout main
          git reset --hard origin/main
          echo "== migrations =="
          docker exec -i uis-timescaledb psql -U uis_user -d urban_immune \
            < migrations/002_nursing_home_pivot.sql || true
          echo "== restart sentinel-api =="
          # 1) 컨테이너로 운영 중이면 재시작
          if docker ps --format '{{.Names}}' | grep -q '^sentinel-api\$'; then
            docker compose -f infra/docker-compose.yml up -d --build sentinel-api
          else
            # 2) bare uvicorn 운영 중이면 재시작
            pkill -f 'uvicorn backend.api.main' || true
            sleep 1
            nohup /home/wlsdud5035/.venv-sentinel/bin/uvicorn \
              backend.api.main:app --host 127.0.0.1 --port 8003 \
              > /tmp/sentinel-api.log 2>&1 &
          fi
          echo "== smoke =="
          sleep 3
          curl -fs http://127.0.0.1:8003/health | head -c 400
          echo ""
          EOF

      - name: Notify on failure
        if: failure()
        run: echo "::error::배포 실패 — Tech Lead(박진영) 확인 필요"
