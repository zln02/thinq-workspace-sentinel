# /etc/nginx/sites-available/uis-capstone 의 server 블록 안에 추가
# 또는 separate include 로 작성

# Sentinel API
location /sentinel/api/ {
    auth_basic "Sentinel";
    auth_basic_user_file /etc/nginx/.htpasswd;

    proxy_pass http://127.0.0.1:8003/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Rate Limit
    limit_req zone=sentinel_zone burst=20 nodelay;
}

# Sentinel Grafana 대시보드
location /sentinel-grafana/ {
    auth_basic "Sentinel Grafana";
    auth_basic_user_file /etc/nginx/.htpasswd;

    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# Sentinel Streamlit 대시보드 (Phase 0 시연용 - 조근범)
location /sentinel/ {
    auth_basic "Sentinel";
    auth_basic_user_file /etc/nginx/.htpasswd;

    proxy_pass http://127.0.0.1:8501/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
}

