name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install fastapi==0.111.0 "uvicorn[standard]==0.30.0" \
                      asyncpg==0.29.0 "redis>=5.0" pydantic==2.7.0 \
                      ruff==0.5.0

      - name: Lint (ruff)
        run: ruff check backend pipeline --select=E,F,W,I --ignore=E501

      - name: Smoke test (5 scenarios)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python tests/smoke_scenarios.py

  frontend:
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package.json') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (no lockfile yet)
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block committed .env files
        run: |
          matches=$(git ls-files | grep -E '(^|/)\.env$|\.env\.[a-zA-Z0-9_-]+$' | grep -v 'example' || true)
          if [ -n "$matches" ]; then
            echo "::error::커밋된 .env 발견 (금지):"
            echo "$matches"
            exit 1
          fi
          echo "OK · .env 미커밋"
